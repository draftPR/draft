# Smart Kanban Configuration
# This file configures execution and verification pipelines for Smart Kanban.

# =============================================================================
# EXECUTION CONFIGURATION
# =============================================================================
# Settings for the execute job that implements ticket changes using AI code tools.
#
# Executor Types:
#   - Claude CLI (headless): Runs automatically, can implement changes without user
#   - Cursor CLI (interactive): Opens editor, transitions to needs_human for manual work
#
# State Transitions:
#   - Headless success with diff → verifying
#   - Headless success with NO diff → blocked (reason: no changes)
#   - Headless failure → blocked
#   - Interactive (Cursor) → needs_human immediately

execute_config:
  # Timeout for executor CLI in seconds (default: 600 = 10 minutes)
  # Increase for complex tickets that may require more time
  timeout: 600

  # Preferred executor CLI to use
  # Options:
  #   - "claude": Claude Code CLI (recommended for automation, headless)
  #   - "cursor": Cursor CLI (interactive, opens editor for human)
  # If preferred is not available, will try the other as fallback
  preferred_executor: "claude"

  # ---------------------------------------------------------------------------
  # YOLO MODE - DANGEROUS: Skip permission prompts
  # ---------------------------------------------------------------------------
  # When enabled, Claude CLI runs with --dangerously-skip-permissions.
  # This allows the AI to run any command without asking for approval.
  #
  # ⚠️  SECURITY WARNING ⚠️
  # Only enable this if you understand the risks:
  #   - AI can run ANY shell command without confirmation
  #   - Prompt injection attacks could execute malicious code
  #   - Network access, file deletion, etc. are all unrestricted
  #
  # Safeguards (enforced by worker):
  #   - Only runs inside isolated worktrees (not main repo)
  #   - Optional allowlist restricts which repos can use YOLO mode
  #
  # Default: false (permissioned mode - safer)
  yolo_mode: false

  # Optional allowlist for YOLO mode
  # If yolo_mode is true, this restricts which repos can use it.
  # Empty list = allow any repo (not recommended)
  # Example: ["/path/to/trusted/repo1", "/path/to/trusted/repo2"]
  # yolo_allowlist: []

# =============================================================================
# VERIFICATION CONFIGURATION
# =============================================================================
# Settings for the verify job that validates ticket implementations.

# Commands to run during ticket verification
# Each command is executed in the ticket's isolated worktree directory.
# Commands run sequentially; verification stops on first failure.
verify_commands:
  - "echo 'Verification placeholder - configure your actual tests here'"
  # Examples:
  # - "pytest tests/"
  # - "npm run test"
  # - "make test"
  # - "cargo test"
  # - "go test ./..."

# Auto-transition behavior when all verification commands succeed
# - true: Automatically transition ticket to 'done' state
# - false: Transition ticket to 'needs_human' state for manual review
auto_transition_on_success: false

