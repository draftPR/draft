# Draft Configuration for Demo Calculator

project:
  name: "Demo Calculator App"
  description: "A simple calculator with bugs - perfect for demonstrating Draft"

execute_config:
  timeout: 300
  preferred_executor: "claude"
  # YOLO mode is configured per-board in the UI (Board Settings)

verify_config:
  commands:
    - "python3 -m py_compile src/calculator.py"
    - "python3 -m py_compile src/utils.py"
    - "python3 -m pytest tests/test_calculator.py::TestCalculator::test_power -v --tb=short"
  on_failure: "blocked"

cleanup_config:
  auto_cleanup_on_merge: true
  worktree_ttl_days: 7
  evidence_ttl_days: 14

merge_config:
  strategy: "merge"
  auto_delete_branch: true
  require_approval: true

planner_config:
  model: "cli/claude"
  max_followups_per_ticket: 2
  max_followups_per_tick: 3
  validate_tickets: true
  reflection_enabled: true
  skip_followup_reasons:
    - "no changes"
    - "executor not found"
