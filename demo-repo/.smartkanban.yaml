# Alma Kanban Configuration for Demo Calculator

project:
  name: "Demo Calculator App"
  description: "A simple calculator with bugs - perfect for demonstrating Alma Kanban"

execute_config:
  timeout: 300
  preferred_executor: "claude"
  yolo_mode: false  # Safe mode for demo
  yolo_allowlist: []

verify_config:
  commands:
    # Check Python syntax
    - "python -m py_compile src/calculator.py"
    - "python -m py_compile src/utils.py"
    # Run tests
    - "python -m pytest tests/ -v --tb=short"
  on_failure: "blocked"

cleanup_config:
  auto_cleanup_on_merge: true
  worktree_ttl_days: 7
  evidence_ttl_days: 14

merge_config:
  strategy: "merge"
  auto_delete_branch: true
  require_approval: true

planner_config:
  model: "bedrock/anthropic.claude-sonnet-4-20250514-v1:0"
  max_followups_per_ticket: 2
  max_followups_per_tick: 3
  validate_tickets: true
  reflection_enabled: true
  skip_followup_reasons:
    - "no changes"
    - "executor not found"
