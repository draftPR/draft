# =============================================================================
# Draft - Development Docker Compose Override
# =============================================================================
# Usage:
#   docker compose -f docker-compose.yaml -f docker-compose.dev.yaml up
# =============================================================================

services:
  api:
    build:
      context: .
      target: runtime
    volumes:
      # Mount source code for live reload
      - ./backend:/app/backend:rw
      - draft-data:/app/data
    environment:
      - TASK_BACKEND=sqlite
      - LOG_LEVEL=debug
    command: >
      sh -c "cd backend && python -m uvicorn app.main:app --reload --host 0.0.0.0 --port 8000"

  frontend:
    image: node:20-slim
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app:rw
    command: npm run dev -- --host 0.0.0.0
    environment:
      - VITE_BACKEND_URL=http://localhost:8000

  # Disable nginx in dev mode (Vite handles frontend)
  nginx:
    profiles:
      - disabled
