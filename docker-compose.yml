version: '3.8'

services:
  # All-in-one Smart Kanban service for local/demo mode
  smart-kanban:
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: smart-kanban
    ports:
      - "3000:3000"   # Frontend UI
      - "8000:8000"   # Backend API
    volumes:
      # Mount demo-repo for execution
      - ./demo-repo:/workspace/demo-repo
      # Persistent data (database, logs)
      - smart-kanban-data:/workspace/data
      # Optional: Mount your own repo for real use
      # - /path/to/your/repo:/workspace/your-repo
    environment:
      # Run in local mode (no Redis required, uses in-memory fallback)
      - SMART_KANBAN_MODE=local
      # Database location
      - DATABASE_URL=sqlite+aiosqlite:///workspace/data/kanban.db
      # CORS for frontend
      - FRONTEND_URL=http://localhost:3000
      # Demo repo as default
      - GIT_REPO_PATH=/workspace/demo-repo
      - BASE_BRANCH=main
      # Optional: Add your LLM API keys
      # - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      # - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      # - AWS_REGION_NAME=us-east-2
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Full Redis setup for production-like experience
  # Uncomment this and set SMART_KANBAN_MODE=production to use real Redis
  # redis:
  #   image: redis:7-alpine
  #   container_name: smart-kanban-redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis-data:/data
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 10s
  #     timeout: 3s
  #     retries: 3

volumes:
  smart-kanban-data:
    name: smart-kanban-data
  # redis-data:
  #   name: smart-kanban-redis-data

networks:
  default:
    name: smart-kanban-network
