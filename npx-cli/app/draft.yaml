# Draft Configuration
# Edit this file to customize how Draft works with your project.
# All settings have sensible defaults — you only need to change what matters to you.

# =============================================================================
# EXECUTION
# =============================================================================

execute_config:
  # Which AI CLI to use: "claude" (recommended) or "cursor"
  preferred_executor: "claude"

  # How long the AI agent can run per ticket (seconds)
  timeout: 600

  # Run multiple tickets in parallel (default: 1 = one at a time)
  max_parallel_jobs: 1

  # YOLO mode: skip permission prompts (default: false)
  # Only works when yolo_allowlist contains your repo path
  yolo_mode: false
  yolo_allowlist: []

# =============================================================================
# VERIFICATION
# =============================================================================
# Commands that run after the AI implements a ticket to check its work.
# Each runs in the ticket's isolated worktree. Stops on first failure.

verify_config:
  commands: []
  # Examples:
  #   - "npm test"
  #   - "npm run lint"
  #   - "python -m pytest -q"
  #   - "cargo test"

# =============================================================================
# MERGE
# =============================================================================

merge_config:
  default_strategy: "merge"    # "merge" or "rebase"
  pull_before_merge: true
  delete_branch_after_merge: true

# =============================================================================
# CLEANUP
# =============================================================================

cleanup_config:
  auto_cleanup_on_merge: true
  worktree_ttl_days: 14
  evidence_ttl_days: 30

# =============================================================================
# PLANNER
# =============================================================================
# The planner automates ticket workflow. Core features (picking next ticket,
# unblocking dependencies) work without any API keys using the CLI.

planner_config:
  # Which model to use for ticket generation
  # "cli/claude" = uses Claude Code CLI (no API key needed)
  model: "cli/claude"

  features:
    # Auto-start executing planned tickets
    auto_execute: false

    # These features require LLM API keys (ANTHROPIC_API_KEY, OPENAI_API_KEY, or AWS creds):
    propose_followups: false    # Suggest fixes for blocked tickets
    generate_reflections: false # Summarize completed tickets

# =============================================================================
# EXECUTOR PROFILES (optional)
# =============================================================================
# Named presets for different execution strategies.
# Use when running a ticket: POST /tickets/{id}/run?executor_profile=fast
#
# Example:
#   executor_profiles:
#     fast:
#       executor_type: claude
#       timeout: 300
#       extra_flags: ["--model", "claude-haiku-4-5-20251001"]
#     thorough:
#       executor_type: claude
#       timeout: 1200
#       extra_flags: ["--model", "claude-opus-4-6"]

executor_profiles: {}
