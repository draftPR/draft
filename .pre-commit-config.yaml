repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^frontend/src/
        types_or: [typescript, tsx, css, json]

  - repo: local
    hooks:
      - id: check-generated-types
        name: Check generated TypeScript types are fresh
        entry: bash -c 'make generate-types && git diff --exit-code frontend/src/types/generated.ts'
        language: system
        files: ^backend/app/
        pass_filenames: false
